# llama-swap config — one stable OpenAI-compatible endpoint that hot-swaps GGUFs
# on demand (only one model in VRAM at a time; idle models unload after `ttl`).
# setup-engine.ps1 copies this to <engine>/llama-swap.yaml. EDIT THE PATHS below
# to match your machine, then add one block per model.
#
# Paths must be ABSOLUTE. The default layout puts the engine next to the repo:
#   <parent>/aegis/          <- this repo
#   <parent>/engine/         <- llamacpp/, llama-swap/, node/, aider-venv/, sdcpp/
# so llama-server.exe is at <parent>/engine/llamacpp/llama-server.exe and your
# GGUFs live in <parent>/aegis/models/.
#
# Key flags: --jinja enables OpenAI tool-call parsing; -fa on = flash attention
# (halves KV memory); -c is the context window (use /engine in-app to auto-size
# it to your GPU); --mmproj <projector> makes a model vision-capable.
#
# Thinking-mode models (Qwen3.6 family especially): add
#   --chat-template-kwargs "{\"enable_thinking\":false}"
# or the model's private reasoning streams out as the visible reply. Quantized
# MoE models also want --dry-multiplier 0.8 (DRY sampler) so long chats can't
# collapse into verbatim repetition loops.
#
# Big MoE that won't fit VRAM: add --cpu-moe to keep the expert weights in
# system RAM (attention + KV stay on the GPU). The KV cache is then the only
# real VRAM cost, so you can run a large -c even on a 24GB card — e.g. a
# 35B-A3B at q8 KV is ~2.5GB at 64K, ~5GB at 128K. Use the in-app Engine panel
# (/engine) to set the window; auto-tune skips --cpu-moe models on purpose.

healthCheckTimeout: 300
logLevel: info

models:
  # ---- Example: a general chat / tool-calling model -------------------------
  # "my-model":
  #   cmd: |
  #     "C:/path/to/engine/llamacpp/llama-server.exe"
  #     -m "C:/path/to/aegis/models/my-model.gguf"
  #     --host 127.0.0.1 --port ${PORT}
  #     -ngl 99 -c 8192 -fa on --jinja --no-webui
  #   ttl: 600

  # ---- Example: a vision model (adds --mmproj) ------------------------------
  # "my-vision":
  #   cmd: |
  #     "C:/path/to/engine/llamacpp/llama-server.exe"
  #     -m "C:/path/to/aegis/models/vl/model.gguf"
  #     --mmproj "C:/path/to/aegis/models/vl/mmproj.gguf"
  #     --host 127.0.0.1 --port ${PORT}
  #     -ngl 99 -c 8192 --no-webui
  #   ttl: 600

  # ---- Example: local image generation via stable-diffusion.cpp -------------
  # sd-server speaks OpenAI's /v1/images/generations. `--backend clip=cpu` keeps
  # the diffusion weights VRAM-resident (huge speedup). checkEndpoint is needed
  # because sd-server has no /health route.
  # "my-image":
  #   cmd: |
  #     "C:/path/to/engine/sdcpp/sd-server.exe"
  #     --diffusion-model "C:/path/to/aegis/models/img/diffusion.gguf"
  #     --llm "C:/path/to/aegis/models/img/text-encoder.gguf"
  #     --vae "C:/path/to/aegis/models/img/vae.safetensors"
  #     --backend clip=cpu --diffusion-fa --vae-tiling
  #     --listen-port ${PORT}
  #   checkEndpoint: /v1/models
  #   ttl: 300

  # ---- Recommended: a CPU-only chat model, so chat can't kill your renders ---
  # THE PROBLEM: a diffusion model fills the card during a render, and llama-swap
  # resolves contention by EVICTING — so sending a chat message mid-render stops
  # the image/video server and your render dies with no explanation. There is no
  # VRAM left to share, so the only fix is a chat model that needs none.
  #
  # `--device none` pins it to the CPU and guarantees zero VRAM (not even a CUDA
  # context — a render can leave under 1GB free). Aegis routes chat here
  # automatically while a render is in flight, tells you it did, and switches
  # back afterwards. Any small instruct GGUF works (1–4B is plenty).
  #
  # Uncomment BOTH this block and the `cpu` group below, and point -m at a real
  # file. Leave it commented if you have no such model: Aegis then logs a warning
  # and leaves chat alone rather than routing you to a model that can't load.
  # Keep -c in sync with gpu_guard.FALLBACK_CONTEXT (default 32768) — agent mode
  # spends thousands of tokens on tool schemas before your message even lands.
  #
  # NB: never put a '#' comment inside a `cmd: |` block — YAML keeps it, and the
  # line gets handed to llama-server as arguments.
  # "chat-lite-cpu":
  #   cmd: |
  #     "C:/path/to/engine/llamacpp/llama-server.exe"
  #     -m "C:/path/to/aegis/models/small-instruct.gguf"
  #     --host 127.0.0.1 --port ${PORT}
  #     --device none -ngl 0 -c 32768 -fa on --jinja --no-webui
  #   ttl: 1800

# ---- Groups: who may share the GPU -----------------------------------------
# Without a `groups:` section every model lands in one implicit group where ANY
# load evicts whatever is loaded — including stopping an in-flight render. These
# groups are what let the CPU fallback coexist with a render instead of killing
# it. (Verified on llama-swap v238: no groups => the second load evicts the
# first; with these => both stay up, in either order.)
#
# Uncomment alongside chat-lite-cpu above, and list YOUR model names as members.
#
# groups:
#   # Everything that wants the GPU. Each fills most of the card, so: one at a
#   # time (swap), and it may evict its peers (exclusive). This is already how
#   # llama-swap behaves by default — naming it changes nothing for these.
#   gpu:
#     swap: true
#     exclusive: true
#     members:
#       - my-model
#       - my-vision
#       - my-image
#   # The CPU fallback.
#   #   exclusive: false -> loading it never evicts a live render.
#   #   persistent: true -> a render loading never evicts it.
#   # Both are required; either alone still breaks in one direction.
#   cpu:
#     swap: false
#     exclusive: false
#     persistent: true
#     members:
#       - chat-lite-cpu
